          React.createElement("button",{onClick:()=>setExp(new Set(flat(data).map(n=>n.id))),style:{padding:"8px 10px",borderRadius:7,background:"var(--bg-accent-subtle)",border:"1px solid var(--border-accent)",color:"var(--fg-accent)",fontFamily:"var(--font-mono)",fontSize:9,cursor:"pointer",textTransform:"uppercase"}},"Expandir"),

        ),
        /* Nodes */

          data.map((node,i)=>React.createElement("div",{key:node.id,style:{animation:"fadeUp 0.4s ease both",animationDelay:(i+1)*80+"ms"}},React.createElement(Node,{node,depth:0,exp,toggle,pc:node.color})))
        ),

          React.createElement("p",{style:{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--fg-muted)"}},"MBA Super Inteligênc[IA] — Turma 2 | 2026 | Anhanguera + SI | MEC")
        )
      )

  );
}
